<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>FC Mondiali — Pool scommesse</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --bg:#06110b;--bg2:#0a1a12;--card:#0f2018;--card2:#13291e;--line:#1d3a2b;
  --pitch:#b6ff3c;--pitch-dim:#7fb52a;--coral:#ff5a3c;--gold:#ffce45;
  --ink:#eef6ee;--muted:#7f9c8b;--muted2:#5e7868;
}
body{font-family:'Archivo',system-ui,sans-serif;color:var(--ink);min-height:100vh;
  background:radial-gradient(1200px 600px at 80% -10%,rgba(182,255,60,.10),transparent 60%),
    radial-gradient(900px 500px at -10% 20%,rgba(255,90,60,.08),transparent 55%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  background-attachment:fixed;}
.wrap{max-width:560px;margin:0 auto;padding:18px 16px 120px;position:relative}
.sticky-top{position:sticky;top:0;z-index:50;background:var(--bg);padding-top:14px;margin-top:-14px;padding-bottom:2px}
.header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 0 10px;animation:rise .6s ease both}
.brand-kicker{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--pitch-dim);font-weight:700;white-space:nowrap}
.brand{font-family:'Anton',sans-serif;font-size:28px;line-height:.9;letter-spacing:.5px;margin-top:2px;white-space:nowrap}
.brand .b2{color:var(--pitch)}
.user-chip{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 12px 6px 8px;font-size:12px;font-weight:800;cursor:pointer;margin-right:2px}
.user-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--pitch);flex:none}
.tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:5px;margin-bottom:18px;animation:rise .6s .05s ease both;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;text-align:center;cursor:pointer;padding:10px 10px;border-radius:10px;font-weight:800;font-size:11.5px;color:var(--muted);border:none;background:none;font-family:inherit;transition:.18s;white-space:nowrap}
.tab.active{background:var(--pitch);color:#06110b;box-shadow:0 6px 18px -8px var(--pitch)}
.card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;animation:rise .55s ease both}
.card.glow{border-color:rgba(182,255,60,.4);box-shadow:0 0 0 1px rgba(182,255,60,.08),0 18px 50px -28px rgba(182,255,60,.5)}
.card.gold{border-color:rgba(255,206,69,.45);box-shadow:0 18px 50px -30px rgba(255,206,69,.55)}
.eyebrow{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:8px}
.h1{font-family:'Anton',sans-serif;font-size:26px;line-height:1;letter-spacing:.4px}
.h2{font-weight:900;font-size:17px}
.sub{color:var(--muted);font-size:13px;line-height:1.5}
.turnbar{display:flex;align-items:center;gap:12px}
.turnbar .num{font-family:'Anton',sans-serif;font-size:30px;color:var(--bg2);min-width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:var(--pitch);flex:none}
.turnbar .right{margin-left:auto;text-align:right}
.daterow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px}
.input,.date,textarea{width:100%;background:#08160f;border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:12px 13px;font-size:15px;font-family:inherit;font-weight:600;outline:none;transition:.15s}
.input:focus,.date:focus,textarea:focus{border-color:var(--pitch);box-shadow:0 0 0 3px rgba(182,255,60,.12)}
.input::placeholder{color:var(--muted2);font-weight:500}
.date{color-scheme:dark}
.btn{cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-align:center;font-family:inherit;font-weight:800;font-size:14.5px;padding:13px 16px;border-radius:12px;border:none;transition:transform .12s,filter .15s,background .15s;width:100%}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--pitch);color:#06110b;box-shadow:0 10px 26px -14px var(--pitch)}
.btn-coral{background:var(--coral);color:#fff;box-shadow:0 10px 26px -14px var(--coral)}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
.btn-ghost:active{border-color:var(--pitch);color:var(--pitch)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.row{display:flex;gap:9px}.row>*{flex:1}
.proposal{position:relative;border:1.5px solid var(--line);background:#08160f;border-radius:14px;padding:14px 14px 22px 50px;margin-bottom:10px;overflow:hidden}
.proposal .tag{position:absolute;left:0;top:0;bottom:0;width:38px;display:grid;place-items:center;font-family:'Anton',sans-serif;font-size:18px;color:var(--muted);background:#0b1b13;border-right:1px solid var(--line)}
.proposal .txt{font-weight:700;font-size:14.5px;line-height:1.35}
.proposal.winner{border-color:var(--gold);background:linear-gradient(180deg,rgba(255,206,69,.14),#08160f)}
.proposal.winner .tag{background:var(--gold);color:#2a1f00}
.votefill{position:absolute;left:0;bottom:0;height:18px;background:var(--pitch);transition:width .5s cubic-bezier(.2,.8,.2,1);border-radius:0 4px 0 0}
.proposal.winner .votefill{background:var(--gold)}
.votecount{position:absolute;bottom:1px;font-weight:900;font-size:10px;z-index:1;line-height:16px}
.votecount-in{right:8px;color:#06110b}
.votecount-out{right:6px;color:var(--pitch);bottom:20px}
.proposal.winner .votecount-in{color:#2a1f00}
.proposal.winner .votecount-out{color:var(--gold)}
.voter{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
.voter:last-child{border-bottom:none}
.voter .nm{flex:1;font-weight:700;font-size:14px}
.voter .opts{display:flex;gap:6px}
.vbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#08160f;color:var(--muted);font-family:'Anton',sans-serif;font-size:15px;cursor:pointer}
.vbtn.on{background:var(--pitch);color:#06110b;border-color:var(--pitch)}
.couple-card{border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;background:#08160f}
.couple-card .ttl{font-weight:900;font-size:13px;color:var(--pitch);margin-bottom:6px}
.couple-card.active{border-color:var(--pitch);box-shadow:0 0 0 1px rgba(182,255,60,.2)}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:#08160f;border:1px solid var(--line);border-radius:14px;padding:14px}
.stat .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
.stat .v{font-family:'Anton',sans-serif;font-size:30px;line-height:1;margin-top:6px}
.stat .v.green{color:var(--pitch)}.stat .v.gold{color:var(--gold)}.stat .v.coral{color:var(--coral)}
.rank{display:flex;align-items:center;gap:12px;padding:11px 6px;border-bottom:1px solid var(--line)}
.rank:last-child{border-bottom:none}
.rank .pos{font-family:'Anton',sans-serif;font-size:20px;width:26px;color:var(--muted)}
.rank .pos.top{color:var(--gold)}
.rank .nm{font-weight:800;font-size:14.5px;flex:1}
.rank .pts{font-weight:900;color:var(--pitch)}
.hist{border-left:2px solid var(--line);padding:0 0 4px 16px;margin-left:6px}
.hist .item{position:relative;padding:12px 0;border-bottom:1px solid var(--line)}
.hist .item:last-child{border-bottom:none}
.hist .item:before{content:"";position:absolute;left:-21px;top:18px;width:9px;height:9px;border-radius:50%;background:var(--muted)}
.hist .item.won:before{background:var(--pitch)}.hist .item.lost:before{background:var(--coral)}
.badge{font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
.badge.won{background:rgba(182,255,60,.15);color:var(--pitch)}
.badge.lost{background:rgba(255,90,60,.15);color:var(--coral)}
.badge.pend{background:rgba(255,255,255,.07);color:var(--muted)}
.note{font-size:12px;color:var(--muted);line-height:1.5}
.fields-row{display:flex;gap:9px;align-items:flex-end}
@media(max-width:420px){.fields-row{flex-direction:column;align-items:stretch}}
.outcome-row{display:flex;gap:9px}
@media(max-width:380px){.outcome-row{flex-direction:column}}
.outcome-row>*{flex:1}
.center{text-align:center}
.pop{animation:pop .35s ease both}
/* ── Calendario ── */
.phase-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.phase-scroll::-webkit-scrollbar{display:none}
.cal-sticky{position:sticky;top:var(--sticky-offset,130px);z-index:20;background:var(--bg);padding-bottom:4px;will-change:transform}
.phase-pill{flex:none;cursor:pointer;font-size:11px;font-weight:800;padding:6px 12px;border-radius:999px;
  border:1px solid var(--line);color:var(--muted);background:var(--card);white-space:nowrap;transition:.15s;font-family:inherit}
.phase-pill.active{background:var(--pitch);color:#06110b;border-color:var(--pitch)}
.day-group{margin-bottom:4px}
.day-header{display:flex;align-items:center;gap:10px;padding:10px 4px 6px;position:sticky;top:var(--day-top,220px);z-index:10;
  background:linear-gradient(180deg,var(--bg) 80%,transparent);backdrop-filter:blur(2px)}
.day-header .day-label{font-family:'Anton',sans-serif;font-size:17px;letter-spacing:.3px;flex:1}
.round-badge{font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 9px;border-radius:999px;background:var(--pitch);color:#06110b;white-space:nowrap}
.match-row{display:flex;align-items:center;
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:7px;
  position:relative;overflow:hidden;cursor:pointer;
  transition:border-color .18s,box-shadow .18s,transform .1s}
.match-row:active{transform:scale(.98)}
.match-row.in-round{border-color:rgba(182,255,60,.5);box-shadow:0 0 0 1px rgba(182,255,60,.08),0 10px 30px -18px rgba(182,255,60,.4)}
.match-row.in-round::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--pitch);border-radius:3px 0 0 3px}
.match-time{font-family:'Anton',sans-serif;font-size:13px;color:var(--muted);width:38px;flex:none}
.match-teams{flex:1;display:flex;flex-direction:column;gap:5px}
.match-team{display:flex;align-items:center;gap:7px}
.match-team img{width:22px;height:15px;border-radius:2px;object-fit:cover;border:1px solid rgba(255,255,255,.08);flex:none}
.match-team .tname{font-weight:800;font-size:13px;line-height:1}
.match-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.match-header .mdate{font-size:11px;color:var(--muted);font-family:'Anton';white-space:nowrap}
@media(max-width:420px){.match-header{flex-direction:column;align-items:flex-start;gap:4px}}
.match-tag{flex:none;margin-left:8px;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.group-tag{font-size:9.5px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 7px;border-radius:6px;background:rgba(182,255,60,.1);color:var(--pitch-dim);border:1px solid rgba(182,255,60,.2)}
.stage-tag{font-size:9.5px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-align:right}
.add-ind{font-size:9px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;color:var(--muted2);transition:color .15s;margin-top:2px}
.match-row.in-round .add-ind{color:var(--pitch)}
.round-summary{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid rgba(182,255,60,.3);
  border-radius:14px;padding:14px;margin-bottom:8px;min-height:72px}
.rs-title{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--pitch-dim);font-weight:700;margin-bottom:8px}
.rs-empty{font-size:13px;color:var(--muted2);font-style:italic}
.rs-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--line)}
.rs-row:last-child{border-bottom:none}
.rs-row img{width:18px;height:12px;border-radius:2px;object-fit:cover;border:1px solid rgba(255,255,255,.08)}
.rs-row .rs-teams{font-size:12px;font-weight:700;flex:1}
.rs-row .rs-time{font-size:11px;color:var(--muted);font-family:'Anton',sans-serif}
/* ── Auth overlay ── */
.overlay{position:fixed;inset:0;background:rgba(6,17,11,.92);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:24px}
.auth-box{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:28px;width:100%;max-width:380px}
.auth-box .logo{font-family:'Anton',sans-serif;font-size:32px;margin-bottom:4px}
.auth-box .logo span{color:var(--pitch)}
.auth-status{font-size:13px;color:var(--muted);margin-top:10px;min-height:20px}
/* ── Toast ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:11px 18px;font-size:13px;font-weight:700;color:var(--ink);
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ── Spinner ── */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--pitch);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.tooltip-trigger{cursor:pointer;position:relative}
#voter-tooltip{position:fixed;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--ink);z-index:200;pointer-events:none;opacity:0;transition:opacity .15s;max-width:200px;white-space:normal;line-height:1.5}
#voter-tooltip.show{opacity:1}
</style>
</head>

// ── Auth ──────────────────────────────────────────────────────
async function initAuth(){
  // Leggi la sessione direttamente da localStorage — sincrono e affidabile
  const storageKey = Object.keys(localStorage).find(k=>k.startsWith('sb-')&&k.endsWith('-auth-token'));
  const stored = storageKey ? JSON.parse(localStorage.getItem(storageKey)||'null') : null;

  if(stored?.access_token){
    // Sessione trovata in localStorage — verifica con Supabase
    const {data:{user},error} = await sb.auth.getUser(stored.access_token);
    if(user&&!error){
      A.user = user;
      await loadProfile();
      await loadRounds();
      initRealtime();
    }
  }

  A.loading = false;
  render();

  // Ascolta nuovi login e logout
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){
      // permetti cambio utente: resetta stato precedente
      A.user=session.user;
      A.profile=null;A.rounds=[];
      await loadProfile();
      await loadRounds();
      initRealtime();
      if(window.location.hash&&window.location.hash.includes('access_token')){
        history.replaceState(null,'',window.location.pathname);
      }
      render();
    }
    if(event==='SIGNED_OUT'){
      A.user=null;A.profile=null;A.rounds=[];
      render();
    }
  });
}

async function loadProfile(){
  const {data}=await sb.from('profiles').select('*').eq('id',A.user.id).single();
  A.profile=data;
}



async function signOut(){
  await destroyRealtime();
  await sb.auth.signOut();
  A.user=null;A.profile=null;A.rounds=[];
  render();
}



// ── Supabase data ─────────────────────────────────────────────
async function loadRounds(){
  const [{data:rounds},{data:couples},{data:allProfiles}]=await Promise.all([
    sb.from('rounds')
      .select(`*, proposals(*, proposal_matches(*, matches(id,date,time,team_home,team_away))), votes(*), round_matches(id, match_id, matches(id,date,time,team_home,team_away,odds_url))`)
      .order('created_at',{ascending:true}),
    sb.from('couples').select('id,name,order_index,member_1,member_2').order('order_index'),
    sb.from('profiles').select('id,name'),
  ]);
  A.rounds=rounds||[];
  A.couples=couples||[];
  A.profiles=allProfiles||[];
}

// Logica round target per selezione partite:
// - nessun round        → round 1 da creare (draft automatico al primo tap)
// - status 'draft'/'open' → round corrente modificabile
// - status 'voting'/'closed' → round corrente bloccato, prossimo round selezionabile (draft)
function targetRound(){
  const r=cur();
  if(!r) return null; // nessun round: tap creerà draft
  if(r.status==='draft'||r.status==='open') return r;
  return null; // voting/closed: tap creerà draft per round successivo
}

function canSelectMatches(){
  const r=cur();
  // si può sempre selezionare: o nessun round (round 1) o round in draft/open
  // o round corrente in voting/closed (prepara il prossimo)
  return true;
}

// Ritorna indici locali MATCHES selezionati per visualizzazione
function targetMatchLocalIds(){
  // cerca il round in draft o open (l'ultimo se ce ne sono più)
  const candidates=A.rounds.filter(r=>r.status==='draft'||r.status==='open');
  const r=candidates[candidates.length-1]||null;
  if(!r) return new Set();
  const ids=new Set();
  (r.round_matches||[]).forEach(rm=>{
    if(rm.matches){
      const idx=MATCHES.findIndex(m=>m.home===rm.matches.team_home&&m.away===rm.matches.team_away);
      if(idx>=0) ids.add(idx);
    }
  });
  return ids;
}

let _realtimeChannel=null;
let _realtimeReady=false;
function initRealtime(){
  if(_realtimeChannel&&_realtimeReady) return;
  if(_realtimeChannel) return; // in corso di chiusura
  _realtimeReady=false;
  _realtimeChannel=sb.channel('public-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'rounds'},()=>loadRounds().then(render))
    .on('postgres_changes',{event:'*',schema:'public',table:'proposals'},()=>loadRounds().then(render))
    .on('postgres_changes',{event:'*',schema:'public',table:'votes'},()=>loadRounds().then(render))
    .on('postgres_changes',{event:'*',schema:'public',table:'round_matches'},()=>loadRounds().then(render))
    .subscribe((status)=>{ if(status==='SUBSCRIBED') _realtimeReady=true; });
}
async function destroyRealtime(){
  if(_realtimeChannel){
    try{ await sb.removeChannel(_realtimeChannel); }catch(e){}
    _realtimeChannel=null;
    _realtimeReady=false;
  }
}

A.startRound=async()=>{
  // se esiste già un draft, portarlo a open
  const draft=A.rounds.find(r=>r.status==='draft');
  if(draft){
    const {error}=await sb.from('rounds').update({status:'open',date:todayISO()}).eq('id',draft.id);
    if(error){showToast('Errore: '+error.message);return;}
    await loadRounds();render();return;
  }
  // altrimenti crea nuovo round open
  const idx=A.rounds.filter(r=>r.status!=='draft').length%COUPLES.length;
  const coupleId=A.couples[idx]?.id;
  if(!coupleId){showToast('Coppie non trovate nel DB');return;}
  const {error}=await sb.from('rounds').insert({
    date:todayISO(),couple_id:coupleId,status:'open',created_by:A.user.id
  });
  if(error)showToast('Errore: '+error.message);
  else{await loadRounds();render();}
};

A.saveProposal=async()=>{
  const r=cur();
  if(!r||r.status!=='open'){showToast('Round non in stato open');return;}
  const existing=(r.proposals||[]).filter(p=>!p._draft);
  if(existing.length>=5){showToast('Massimo 5 proposte per round');return;}

  // raccogli dati dal form
  const giocata=parseFloat(document.getElementById('prop-giocata')?.value)||null;
  const vincita=parseFloat(document.getElementById('prop-vincita')?.value)||null;
  if(!giocata||!vincita){showToast('Inserisci giocata e vincita potenziale');return;}

  // raccogli le partite con scommessa e quota
  const roundMatches=(r.round_matches||[]).map(rm=>rm.matches).filter(Boolean);
  const matchRows=[];
  for(const m of roundMatches){
    const scommessa=(document.getElementById('scommessa-'+m.id)?.value||'').trim();
    const quota=parseFloat(document.getElementById('quota-'+m.id)?.value)||null;
    if(scommessa) matchRows.push({match_id:m.id,scommessa,quota});
  }
  if(!matchRows.length){showToast('Inserisci almeno una scommessa');return;}

  // inserisci proposal
  const {data:prop,error:e1}=await sb.from('proposals')
    .insert({round_id:r.id,couple_id:r.couple_id,author_id:A.user.id,
             text:matchRows.map(m=>m.scommessa).join(' + '),
             giocata,vincita_pot:vincita})
    .select().single();
  if(e1){showToast('Errore: '+e1.message);return;}

  // inserisci proposal_matches
  const pmRows=matchRows.map(m=>({proposal_id:prop.id,match_id:m.match_id,scommessa:m.scommessa,quota:m.quota}));
  const {error:e2}=await sb.from('proposal_matches').insert(pmRows);
  if(e2){showToast('Errore: '+e2.message);return;}

  showToast('Proposta salvata ✓');
  await loadRounds();render();
};

A.vote=async(propId)=>{
  const r=cur();
  const myVotes=(r.votes||[]).filter(v=>v.user_id===A.user.id);
  const existing=myVotes.find(v=>v.proposal_id===propId);

  // ── optimistic update ──
  if(existing){
    r.votes=r.votes.filter(v=>v.id!==existing.id);
  } else {
    if(myVotes.length>=2){showToast('Puoi votare al massimo 2 proposte');return;}
    r.votes=[...(r.votes||[]),{id:'_opt_vote_'+propId,round_id:r.id,user_id:A.user.id,proposal_id:propId}];
  }
  render(); // UI immediata

  // ── sync DB ──
  if(existing){
    const {error}=await sb.from('votes').delete().eq('id',existing.id);
    if(error){showToast('Errore sync: '+error.message);}
  } else {
    const {error}=await sb.from('votes').insert({round_id:r.id,user_id:A.user.id,proposal_id:propId});
    if(error){showToast('Errore sync: '+error.message);}
  }
  await loadRounds();render();
};

// cache dbMatchId per evitare query ripetute
const _matchIdCache={};

A.toggleMatch=async(matchId)=>{
  const m=MATCHES[matchId];

  // partite nel passato non selezionabili
  const matchDateTime=new Date(m.date+'T'+(m.time||'23:59')+':00');
  if(matchDateTime<new Date()){showToast('Partita già disputata');return;}

  // trova round draft/open esistente
  let r=A.rounds.find(r=>r.status==='draft'||r.status==='open')||null;

  // se non esiste (es. round corrente in voting/closed), crea draft per round successivo
  if(!r){
    // indice prossima coppia = numero round non-draft completati % 4
    const completedRounds=A.rounds.filter(r=>r.status!=='draft');
    const nextIdx=completedRounds.length%COUPLES.length;
    const coupleId=A.couples[nextIdx]?.id;
    if(!coupleId){showToast('Coppie non trovate nel DB');return;}
    const {data:newRound,error}=await sb.from('rounds')
      .insert({date:todayISO(),couple_id:coupleId,status:'draft',created_by:A.user.id})
      .select().single();
    if(error){showToast('Errore: '+error.message);return;}
    await loadRounds();
    r=A.rounds.find(r=>r.id===newRound.id);
    if(!r){showToast('Errore nel trovare il round creato');return;}
  }

  // ottieni dbMatchId (con cache)
  let dbMatchId=_matchIdCache[matchId];
  if(!dbMatchId){
    const {data:matchRows}=await sb.from('matches').select('id')
      .eq('date',m.date).eq('team_home',m.home).eq('team_away',m.away).limit(1);
    if(!matchRows||!matchRows.length){showToast('Partita non trovata nel DB');return;}
    dbMatchId=matchRows[0].id;
    _matchIdCache[matchId]=dbMatchId;
  }

  const existing=(r.round_matches||[]).find(rm=>rm.match_id===dbMatchId);

  // ── optimistic update ──
  if(existing){
    const hasProposals=(r.proposals||[]).some(p=>
      (p.proposal_matches||[]).some(pm=>pm.match_id===dbMatchId)
    );
    if(hasProposals){showToast('Rimuovi prima le proposte che includono questa partita');return;}
    r.round_matches=r.round_matches.filter(rm=>rm.match_id!==dbMatchId);
    showToast(`${m.home} – ${m.away} rimossa`);
  } else {
    r.round_matches=[...(r.round_matches||[]),{
      id:'_opt_'+matchId, match_id:dbMatchId,
      matches:{id:dbMatchId,date:m.date,time:m.time,team_home:m.home,team_away:m.away}
    }];
    showToast(`${m.home} – ${m.away} aggiunta ✓`);
  }
  render(); // UI immediata

  // ── sync DB in background ──
  if(existing){
    const {error}=await sb.from('round_matches').delete().eq('round_id',r.id).eq('match_id',dbMatchId);
    if(error){showToast('Errore sync: '+error.message);await loadRounds();render();}
  } else {
    const {error}=await sb.from('round_matches').insert({round_id:r.id,match_id:dbMatchId});
    if(error){showToast('Errore sync: '+error.message);await loadRounds();render();}
    else{await loadRounds();render();} // refresh per avere id reale
  }
};

function cur(){return A.rounds[A.rounds.length-1]||null;}

// ── RENDER PRINCIPALE ─────────────────────────────────────────
function render(){
  if(A.loading){
    document.getElementById('root').innerHTML='<div class="center" style="padding-top:80px"><div class="spinner"></div></div>';
    return;
  }
  if(!A.user){renderAuth();return;}

  const tabs=[['turno','Turno'],['calendario','Calendario'],['storico','Registro'],['classifica','Classifica'],['coppie','Coppie']];
  let html=`
  <div class="sticky-top">
    <div class="header">
      <div style="min-width:0;flex:1">
        <div class="brand-kicker">Pool scommesse · FIFA WC 2026</div>
        <div class="brand">FC <span class="b2">MONDIALI</span></div>
      </div>
      <div class="user-chip" onclick="signOut()" style="flex:none;max-width:130px;overflow:hidden;align-self:center">
        <div class="dot"></div><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(A.profile?.name||A.user.email.split('@')[0])}</span>
      </div>
    </div>
    <div class="tabs">
      ${tabs.map(([k,l])=>`<button class="tab ${A.view===k?'active':''}" onclick="A.setView('${k}')">${l}</button>`).join('')}
    </div>
  </div>`;

  if(A.view==='turno')       html+=viewTurno();
  else if(A.view==='calendario') html+=viewCalendario();
  else if(A.view==='storico')    html+=viewStorico();
  else if(A.view==='classifica') html+=viewClassifica();
  else if(A.view==='coppie')     html+=viewCoppie();

  document.getElementById('root').innerHTML=html;

  if(A.view==='calendario'){
    setTimeout(()=>{
      const el=document.querySelector('.match-row.in-round')||document.querySelector('.round-badge');
      if(el)el.closest('.day-group')?.scrollIntoView({behavior:'smooth',block:'start'});
    },80);
  }
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pwd=document.getElementById('l-pwd').value.trim();
  if(!email||!pwd){showToast('Inserisci email e password');return;}
  const btn=document.getElementById('l-btn');
  btn.disabled=true;btn.textContent='Accesso…';
  const {error}=await sb.auth.signInWithPassword({email,password:pwd});
  if(error){
    showToast('Credenziali non valide');
    btn.disabled=false;btn.textContent='Accedi';
  }
}

function renderAuth(){
  document.getElementById('root').innerHTML=`
  <div class="overlay">
    <div class="auth-box">
      <div class="logo">FC <span>MONDIALI</span></div>
      <div class="sub" style="margin-bottom:24px">Pool scommesse · Mondiale 2026</div>
      <input id="l-email" class="input" type="email" placeholder="nome@fcmondiali.local" autocomplete="email" style="margin-bottom:10px">
      <input id="l-pwd" class="input" type="password" placeholder="password" autocomplete="current-password" style="margin-bottom:14px">
      <button id="l-btn" class="btn btn-primary" onclick="doLogin()">Accedi</button>
    </div>
  </div>`;
  setTimeout(()=>{
    const el=document.getElementById('l-email');
    if(el)el.focus();
  },100);
}

// ── VIEW: TURNO ───────────────────────────────────────────────
function viewTurno(){
  if(!A.rounds.length){
    return `<div class="card glow center">
      <div style="font-size:40px">🏁</div>
      <div class="h1" style="margin:8px 0">SI PARTE</div>
      <div class="sub" style="margin-bottom:16px">Nessun turno avviato. La prima a proporre è <b style="color:var(--pitch)">${esc(COUPLES[0].name)}</b>.</div>
      <button class="btn btn-primary" onclick="A.startRound()">Avvia il 1° turno</button>
    </div>`;
  }
  const r=cur();
  // trova coppia dal DB usando couple_id del round
  const dbCouple=A.couples.find(c=>c.id===r.couple_id);
  const couple=dbCouple
    ? {name:dbCouple.name, members:COUPLES.find(c=>c.name===dbCouple.name)?.members||[]}
    : COUPLES[(A.rounds.length-1)%COUPLES.length];
  const proposals=r.proposals||[];
  const votes=r.votes||[];
  const myVotes=(r.votes||[]).filter(v=>v.user_id===A.user.id);
  const isProposer=dbCouple&&(dbCouple.member_1===A.user.id||dbCouple.member_2===A.user.id);
  const counts={};proposals.forEach(p=>{counts[p.id]=votes.filter(v=>v.proposal_id===p.id).length;});
  const totalVotes=votes.length;
  const maxC=Math.max(0,...Object.values(counts));
  const selected=proposals.find(p=>p.is_selected);

  let h=`<div class="card glow">
    <div class="turnbar">
      <div>
        <div class="eyebrow" style="margin:0">Turno</div>
        <div class="num" style="width:auto;padding:0 10px;margin-top:2px">${A.rounds.length}</div>
      </div>
      <div style="flex:1;min-width:0">
        <div class="eyebrow" style="margin:0">propone</div>
        <div style="font-weight:900;font-size:14px;color:var(--pitch);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px">${esc(couple.name)}</div>
        <div class="sub" style="font-size:11px">${esc(couple.members.join(' & '))}</div>
      </div>
      <div class="right" style="flex:none">
        <div style="font-family:'Anton';font-size:16px">${fmtDate(r.date)}</div>
      </div>
    </div>
  </div>`;

  if(r.status==='draft'){
    const nextCouple=A.couples[A.rounds.filter(r=>r.status!=='draft').length%COUPLES.length];
    const nextCoupleName=nextCouple?COUPLES.find(c=>c.name===nextCouple.name)?.name||nextCouple.name:COUPLES[0].name;
    h+=`<div class="card glow center">
      <div class="sub" style="margin-bottom:12px">Partite selezionate nel calendario. Quando sei pronto avvia il round.</div>
      <button class="btn btn-primary" onclick="A.startRound()">Avvia il turno · ${esc(nextCoupleName)}</button>
    </div>`;
    return h;
  }

  if(r.status==='open'){
    const roundMatchesList=(r.round_matches||[]).map(rm=>rm.matches)
      .filter(m=>m&&m.date&&m.time)
      .sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    const savedProposals=r.proposals||[];

    if(isProposer){
      // mostra proposte già salvate
      if(savedProposals.length){
        h+=`<div class="card"><div class="eyebrow">Proposte inserite (${savedProposals.length}/5)</div>`;
        savedProposals.forEach((p,i)=>{
          const pms=(p.proposal_matches||[]).sort((a,b)=>{
            const ma=a.matches,mb=b.matches;
            if(!ma||!mb)return 0;
            return (ma.date+ma.time).localeCompare(mb.date+mb.time);
          });
          const pmRows=pms.map(pm=>`
            <div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--line)">
              ${pm.matches?flagImg(pm.matches.team_home,18)+''+flagImg(pm.matches.team_away,18):''}
              <span style="flex:1;font-size:12px;font-weight:700">${esc(pm.scommessa)}</span>
              ${pm.quota?`<span style="font-size:12px;color:var(--pitch);font-weight:900">@${pm.quota}</span>`:''}
            </div>`).join('');
          h+=`<div class="proposal">
            <div class="tag">${L(i)}</div>
            <div class="txt" style="font-size:12px;padding-right:28px">
              ${pmRows||'—'}
              ${p.giocata?`<div style="font-size:11px;color:var(--muted);margin-top:6px;padding-top:4px;border-top:1px solid var(--line)">Giocata: €${p.giocata}${p.vincita_pot?' · Vincita pot.: €'+p.vincita_pot:''}</div>`:''}
            </div>
            <button onclick="event.stopPropagation();A.deleteProposal('${p.id}')" style="position:absolute;right:10px;top:10px;background:rgba(255,90,60,.15);border:none;border-radius:8px;color:var(--coral);font-size:11px;font-weight:900;padding:4px 8px;cursor:pointer">✕</button>
            ${profileName(p.author_id)?`<div style="position:absolute;right:10px;bottom:24px;font-size:9px;color:var(--muted2);font-weight:700">proposta da ${esc(profileName(p.author_id))}</div>`:''}
          </div>`;
        });
        h+=`</div>`;
      }

      // form nuova proposta (se < 5)
      if(savedProposals.length<5){
        h+=`<div class="card glow">
          <div class="eyebrow">Nuova proposta ${savedProposals.length+1}/5</div>
          <div class="sub" style="margin-bottom:14px">Seleziona le scommesse sulle partite del round.</div>`;

        if(!roundMatchesList.length){
          h+=`<div class="note" style="margin-bottom:12px">Nessuna partita nel round — aggiungile dal tab Calendario.</div>`;
        } else {
          roundMatchesList.forEach(m=>{
            const mDate=fmtDate(m.date);
            h+=`<div style="background:#08160f;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px">
              <div class="match-header">
                <span class="mdate">${mDate} · ${m.time.slice(0,5)}</span>
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                  ${flagImg(m.team_home)} <span style="font-weight:800;font-size:13px">${esc(m.team_home)}</span>
                  <span style="color:var(--muted);font-size:11px;font-weight:700">vs</span>
                  ${flagImg(m.team_away)} <span style="font-weight:800;font-size:13px">${esc(m.team_away)}</span>
                  ${m.odds_url?`<a href="${esc(m.odds_url)}" target="_blank" rel="noopener" style="color:var(--pitch);line-height:1;text-decoration:none;margin-left:4px" onclick="event.stopPropagation()">${EXT_ICON}</a>`:''}
                </div>
              </div>
              <input id="scommessa-${m.id}" class="input" placeholder="Scommessa (es. 1X, Over 2.5…)" style="margin-bottom:8px">
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap">Quota</span>
                <input id="quota-${m.id}" class="input" placeholder="es. 2.50" type="number" step="0.01" min="1">
              </div>
            </div>`;
          });
        }

        h+=`<div class="fields-row" style="margin-bottom:12px">
          <div style="flex:1">
            <div class="eyebrow" style="margin-bottom:4px">Giocata €</div>
            <input id="prop-giocata" class="input" type="number" step="0.01" min="0" placeholder="0.00">
          </div>
          <div style="flex:1">
            <div class="eyebrow" style="margin-bottom:4px">Vincita potenziale €</div>
            <input id="prop-vincita" class="input" type="number" step="0.01" min="0" placeholder="0.00">
          </div>
        </div>
        <button class="btn btn-primary" onclick="A.saveProposal()">Conferma proposta</button>
        </div>`;
      }

      // tasto per aprire votazione
      if(savedProposals.length>0){
        h+=`<div class="card">
          <div class="sub" style="margin-bottom:12px">Quando hai finito di inserire le proposte, apri la votazione.</div>
          <button class="btn btn-coral" onclick="A.openVoting()">Apri la votazione (${savedProposals.length} proposta${savedProposals.length>1?'e':''})</button>
        </div>`;
      }
    } else {
      // non-proponenti: vedono proposte in sola lettura
      if(savedProposals.length){
        h+=`<div class="card"><div class="eyebrow">Proposte di ${esc(couple.name)}</div>`;
        savedProposals.forEach((p,i)=>{
          const pms=(p.proposal_matches||[]).sort((a,b)=>{
            const ma=a.matches,mb=b.matches;
            if(!ma||!mb)return 0;
            return (ma.date+ma.time).localeCompare(mb.date+mb.time);
          });
          const pmRows=pms.map(pm=>`
            <div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--line)">
              ${pm.matches?flagImg(pm.matches.team_home,18)+flagImg(pm.matches.team_away,18):''}
              <span style="flex:1;font-size:12px;font-weight:700">${esc(pm.scommessa)}</span>
              ${pm.quota?`<span style="font-size:12px;color:var(--pitch);font-weight:900">@${pm.quota}</span>`:''}
            </div>`).join('');
          h+=`<div class="proposal" style="margin-bottom:8px">
            <div class="tag">${L(i)}</div>
            <div class="txt" style="font-size:12px;padding-right:0">
              ${pmRows||'—'}
              ${p.giocata?`<div style="font-size:11px;color:var(--muted);margin-top:6px;padding-top:4px;border-top:1px solid var(--line)">Giocata €${p.giocata}${p.vincita_pot?' · Vincita pot. €'+p.vincita_pot:''}</div>`:''}
            </div>
            ${profileName(p.author_id)?`<div style="position:absolute;right:10px;bottom:24px;font-size:9px;color:var(--muted2);font-weight:700">proposta da ${esc(profileName(p.author_id))}</div>`:''}
          </div>`;
        });
        h+=`</div>`;
      } else {
        h+=`<div class="card"><div class="sub center">In attesa delle proposte di ${esc(couple.name)}…</div></div>`;
      }
    }
    return h;
  }

  // status: voting o closed
  h+=`<div class="card ${selected&&selected.outcome==='won'?'gold':''}">
    <div class="eyebrow">${r.status==='closed'?'Risultato votazione':`Votazione · ${totalVotes} voti`}</div>`;

  // ordina per voti decrescenti in voting/closed, per created_at in open
  const sortedProposals = r.status==='voting'||r.status==='closed'
    ? [...proposals].sort((a,b)=>(counts[b.id]||0)-(counts[a.id]||0)||((a.created_at||'').localeCompare(b.created_at||'')))
    : [...proposals].sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||''));

  sortedProposals.forEach((p,i)=>{
    const cnt=counts[p.id]||0;
    const pct=maxC>0?Math.round(cnt/maxC*100):0;
    const win=r.status==='closed'&&p.is_selected;
    const myVotesLocal=(r.votes||[]).filter(v=>v.user_id===A.user.id);
    const isMine=myVotesLocal.some(v=>v.proposal_id===p.id);
    const canVote=r.status==='voting'&&!isProposer;

    const pms=(p.proposal_matches||[]).sort((a,b)=>{
      const ma=a.matches,mb=b.matches;
      if(!ma||!mb)return 0;
      return (ma.date+ma.time).localeCompare(mb.date+mb.time);
    });
    const pmDetail=pms.map(pm=>`
      <div style="display:flex;align-items:center;gap:6px;padding:3px 0">
        ${pm.matches?flagImg(pm.matches.team_home,16)+flagImg(pm.matches.team_away,16):''}
        <span style="flex:1;font-size:11px;font-weight:700">${esc(pm.scommessa)}</span>
        ${pm.quota?`<span style="font-size:11px;color:var(--pitch);font-weight:900">@${pm.quota}</span>`:''}
      </div>`).join('');

    h+=`<div class="proposal ${win?'winner':''}" ${canVote?`onclick="A.vote('${p.id}')" style="cursor:pointer"`:''}>
      <div class="tag" style="${isMine?'background:var(--pitch);color:#06110b':win?'background:var(--gold);color:#2a1f00':''}">
        ${L(sortedProposals.indexOf(p))}${isMine?'<div style="font-size:8px;margin-top:1px">✓</div>':''}
      </div>
      <div class="txt">
        ${pmDetail||esc(p.text)}
        ${p.giocata?`<div style="font-size:10px;color:var(--muted);margin-top:4px;padding-top:3px;border-top:1px solid var(--line)">Giocata €${p.giocata}${p.vincita_pot?' · Vincita pot. €'+p.vincita_pot:''}</div>`:''}
      </div>
      ${totalVotes>0||r.status==='closed'?`
        <div class="votefill" style="width:${pct}%"></div>
        <div class="votecount ${pct>=25?'votecount-in':'votecount-out'} tooltip-trigger" data-voters="${
          (r.votes||[]).filter(v=>v.proposal_id===p.id).map(v=>profileName(v.user_id)).join(', ')||''
        }">${cnt} vot${cnt===1?'o':'i'}</div>`:''}
    </div>`;
  });

  if(r.status==='voting'){
    if(!isProposer){
      h+=`<div class="note" style="margin:8px 0 12px">Tocca le proposte per votare (max 2) · ri-tocca per annullare</div>`;
    }
    h+=`<button class="btn btn-coral" style="margin-top:10px" onclick="A.closeVoting()">Chiudi votazione</button>`;
  }
  if(r.status==='closed'){
    h+=`<button class="btn btn-ghost" style="margin-top:10px" onclick="A.reopenVoting()">↺ Riapri votazione</button>`;
  }
  h+=`</div>`;



  // fase closed — selezione proposte da piazzare
  if(r.status==='closed'){
    if(isProposer){
      const selectedCount=(proposals||[]).filter(p=>p.is_selected).length;
      h+=`<div class="card">
        <div class="eyebrow" style="color:var(--gold)">Seleziona le proposte da piazzare</div>
        <div class="sub" style="margin-bottom:12px">Tocca una proposta per selezionarla/deselezionarla. Gli esiti si registrano nel Registro.</div>
        ${(proposals||[]).sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||'')).map((p,i)=>`
          <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer" onclick="A.toggleSelected('${p.id}')">
            <div style="width:28px;height:28px;border-radius:8px;border:1.5px solid ${p.is_selected?'var(--pitch)':'var(--line)'};background:${p.is_selected?'var(--pitch)':'transparent'};display:grid;place-items:center;flex:none;transition:.15s">
              ${p.is_selected?'<span style="color:#06110b;font-weight:900;font-size:14px">✓</span>':''}
            </div>
            <div style="flex:1;font-weight:700;font-size:13px">${L(i)} — ${esc(p.text||((p.proposal_matches||[]).map(pm=>pm.scommessa).join(' + ')))}</div>
          </div>`).join('')}
      </div>`;
    }
    const nextCoupleName=COUPLES[A.rounds.length%COUPLES.length]?.name||'';
    h+=`<div class="card">
      <div class="eyebrow">Avanti</div>
      <div class="h2" style="margin-bottom:4px">Prossimo turno → ${esc(nextCoupleName)}</div>
      <button class="btn btn-primary" onclick="A.nextRound()">Avvia il turno successivo</button>
    </div>`;
  }
  return h;
}

// ── VIEW: CALENDARIO ─────────────────────────────────────────
function viewCalendario(){
  const r=cur();
  const tRound=targetRound();
  const localIds=targetMatchLocalIds(); // usa draft/open
  const today=todayISO();

  // etichetta round summary
  // round con partite selezionate = primo in draft o open
  const selRound=A.rounds.find(r=>r.status==='draft'||r.status==='open')||null;
  const summaryTitle = selRound
    ? selRound.status==='draft'
      ? `Prossimo round · in preparazione`
      : `Round corrente · ${fmtDay(selRound.date)}`
    : A.rounds.length===0
      ? `Round 1 · seleziona partite`
      : `Prossimo round · seleziona partite`;

  const selMatches=[...localIds].map(i=>MATCHES[i]).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  let h=`<div class="round-summary">
    <div class="rs-title">${summaryTitle}</div>`;
  if(!selMatches.length){
    h+=`<div class="rs-empty">Tocca una partita per aggiungerla al round</div>`;
  } else {
    selMatches.forEach(m=>{
      // recupera odds_url dal round_matches DB se disponibile
      const rmEntry=tRound?(tRound.round_matches||[]).find(rm=>rm.matches&&rm.matches.team_home===m.home&&rm.matches.team_away===m.away):null;
      const oddsUrl=rmEntry?.matches?.odds_url||null;
      h+=`<div class="rs-row">
        ${flagImg(m.home,18)} ${flagImg(m.away,18)}
        <span class="rs-teams">${esc(m.home)} – ${esc(m.away)}</span>
        <span class="rs-time">${m.time}</span>
        ${oddsUrl?`<a href="${esc(oddsUrl)}" target="_blank" rel="noopener" style="color:var(--pitch);flex:none;line-height:1;text-decoration:none" onclick="event.stopPropagation()">${EXT_ICON}</a>`:''}
      </div>`;
    });
  }
  h+=`</div>`;

  const PHASES=['Tutti','Gironi','Sedicesimi','Ottavi','Quarti','Semifinale','Finale 3° posto','Finale'];
  h=`<div class="cal-sticky">${h}<div class="phase-scroll">${PHASES.map(p=>`<button class="phase-pill ${A.calPhase===p?'active':''}" onclick="A.calPhase='${p}';render()">${p}</button>`).join('')}</div></div>`;

  const filtered=A.calPhase==='Tutti'?MATCHES:MATCHES.filter(m=>m.stage===A.calPhase);
  const grouped={};
  filtered.forEach(m=>{if(!grouped[m.date])grouped[m.date]=[];grouped[m.date].push(m);});

  Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,matches])=>{
    const isToday=date===today;
    const label=isToday?'Oggi':fmtDay(date);
    const isRound=tRound&&tRound.date===date;
    h+=`<div class="day-group">
      <div class="day-header">
        <div class="day-label">${label}</div>
        ${isRound?`<div class="round-badge">Round corrente</div>`:''}
      </div>`;
    matches.forEach(m=>{
      const inRound=localIds.has(m.id);
      const canToggle=true; // sempre selezionabile
      h+=`<div class="match-row ${inRound?'in-round':''}" ${canToggle?`onclick="A.toggleMatch(${m.id})"`:''} style="${canToggle?'':'opacity:.5;cursor:default'}">
        <div class="match-time">${m.time}</div>
        <div class="match-teams">
          <div class="match-team">${flagImg(m.home)} <span class="tname">${esc(m.home)}</span></div>
          <div class="match-team">${flagImg(m.away)} <span class="tname">${esc(m.away)}</span></div>
        </div>
        <div class="match-tag">
          ${m.group?`<span class="group-tag">Gr. ${m.group}</span>`:`<span class="stage-tag">${esc(m.stage)}</span>`}
          ${canToggle?`<span class="add-ind">${inRound?'● nel round':'+ aggiungi'}</span>`:''}
        </div>
      </div>`;
    });
    h+=`</div>`;
  });
  return h;
}

// ── VIEW: STORICO ─────────────────────────────────────────────
// stato espansione registro
const _regOpen={};

function viewStorico(){
  if(!A.rounds.length)return`<div class="card"><div class="sub center">Ancora nessun turno.</div></div>`;
  let h='';
  [...A.rounds].reverse().forEach((r,k)=>{
    const rIdx=A.rounds.length-1-k;
    const dbCouple=A.couples.find(c=>c.id===r.couple_id);
    const coupleName=dbCouple?.name||COUPLES[rIdx%COUPLES.length]?.name||'';
    const proposals=r.proposals||[];
    const votes=r.votes||[];
    const selectedProps=proposals.filter(p=>p.is_selected);
    const allOutcomes=proposals.map(p=>p.outcome);
    const hasWon=allOutcomes.some(o=>o==='won');
    const hasLost=allOutcomes.some(o=>o==='lost');
    const statusLabel=r.status==='closed'?'Chiuso':r.status==='voting'?'In votazione':r.status==='open'?'Aperto':'Bozza';
    const isOpen=!!_regOpen[r.id];
    const counts={};proposals.forEach(p=>{counts[p.id]=votes.filter(v=>v.proposal_id===p.id).length;});
    const maxC=Math.max(0,...Object.values(counts));

    h+=`<div class="card" style="margin-bottom:10px;cursor:pointer" onclick="A.toggleReg('${r.id}')">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-family:'Anton';font-size:22px;color:var(--pitch);width:32px;flex:none">${A.rounds.length-k}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:900;font-size:14px;color:var(--pitch);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(coupleName)}</div>
          <div style="font-size:11px;color:var(--muted)">${fmtDate(r.date)} · ${statusLabel}${selectedProps.length?' · '+selectedProps.length+' scelt'+(selectedProps.length===1?'a':'e'):''}</div>
        </div>
        <div style="font-size:18px;color:var(--muted);transition:transform .2s;transform:rotate(${isOpen?180:0}deg)">▾</div>
      </div>

      ${isOpen?`<div style="margin-top:14px;border-top:1px solid var(--line);padding-top:12px" onclick="event.stopPropagation()">
        ${proposals.length===0?`<div class="sub">Nessuna proposta.</div>`:''}
        ${[...proposals].sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||'')).map((p,i)=>{
          const cnt=counts[p.id]||0;
          const pct=maxC>0?Math.round(cnt/maxC*100):0;
          const pms=(p.proposal_matches||[]).sort((a,b)=>{
            const ma=a.matches,mb=b.matches;
            if(!ma||!mb)return 0;
            return (ma.date+ma.time).localeCompare(mb.date+mb.time);
          });
          const pmDetail=pms.map(pm=>`
            <div style="display:flex;align-items:center;gap:6px;padding:3px 0">
              ${pm.matches?flagImg(pm.matches.team_home,16)+flagImg(pm.matches.team_away,16):''}
              <span style="flex:1;font-size:11px;font-weight:700">${esc(pm.scommessa)}</span>
              ${pm.quota?`<span style="font-size:11px;color:var(--pitch);font-weight:900">@${pm.quota}</span>`:''}
            </div>`).join('');
          const outcomeBtn=(outcome,label,cls)=>
            `<button onclick="event.stopPropagation();A.setOutcomeReg('${p.id}','${outcome}')"
              style="flex:1;padding:6px 8px;border-radius:8px;border:1px solid var(--line);font-size:11px;font-weight:900;font-family:inherit;cursor:pointer;
              background:${p.outcome===outcome?(outcome==='won'?'var(--pitch)':'var(--coral)'):'transparent'};
              color:${p.outcome===outcome?(outcome==='won'?'#06110b':'#fff'):'var(--muted)'}">${label}</button>`;
          return `<div class="proposal ${p.is_selected?'winner':''}" style="margin-bottom:8px">
            <div class="tag" style="${p.is_selected?'background:var(--gold);color:#2a1f00':''}">
              ${L(i)}${p.is_selected?'<div style="font-size:8px;margin-top:1px">★</div>':''}
            </div>
            <div class="txt">
              ${pmDetail||esc(p.text)}
              ${p.giocata?`<div style="font-size:10px;color:var(--muted);margin-top:4px;padding-top:3px;border-top:1px solid var(--line)">Giocata €${p.giocata}${p.vincita_pot?' · Vincita pot. €'+p.vincita_pot:''}</div>`:''}
              <div style="display:flex;gap:6px;margin-top:8px">
                ${outcomeBtn('won','Vinta ✓','won')}
                ${outcomeBtn('lost','Persa ✕','lost')}
                ${outcomeBtn('pending','In attesa','pend')}
              </div>
            </div>
            ${profileName(p.author_id)?`<div style="position:absolute;right:10px;bottom:22px;font-size:9px;color:var(--muted2);font-weight:700">proposta da ${esc(profileName(p.author_id))}</div>`:''}
            ${votes.length>0?`
              <div class="votefill" style="width:${pct}%"></div>
              <div class="votecount ${pct>=25?'votecount-in':'votecount-out'} tooltip-trigger" data-voters="${
                votes.filter(v=>v.proposal_id===p.id).map(v=>profileName(v.user_id)).join(', ')||''
              }">${cnt} vot${cnt===1?'o':'i'}</div>`:''}
          </div>`;
        }).join('')}
      </div>`:''}
    </div>`;
  });
  return h;
}

A.toggleReg=(roundId)=>{
  _regOpen[roundId]=!_regOpen[roundId];
  render();
};

// ── VIEW: CLASSIFICA ──────────────────────────────────────────
function viewClassifica(){
  const closed=A.rounds.filter(r=>r.status==='closed');
  const cs=COUPLES.map((c,idx)=>{
    const mine=closed.filter((_,i)=>i%COUPLES.length===idx);
    const won=mine.filter(r=>(r.proposals||[]).find(p=>p.is_selected&&p.outcome==='won')).length;
    const lost=mine.filter(r=>(r.proposals||[]).find(p=>p.is_selected&&p.outcome==='lost')).length;
    return{name:c.name,played:mine.length,won,lost};
  }).sort((a,b)=>b.won-a.won||a.lost-b.lost);

  // pronosticatori: +1 se voto su proposta won, +1 se autore di proposta won
  const pts={};PEOPLE.forEach(p=>pts[p]=0);
  closed.forEach(r=>{
    (r.proposals||[]).filter(p=>p.outcome==='won').forEach(p=>{
      // chi ha votato questa proposta
      (r.votes||[]).filter(v=>v.proposal_id===p.id).forEach(v=>{
        const prof=v.user_id; // useremo id, non nome — da migliorare con join
      });
    });
  });

  const totW=closed.filter(r=>(r.proposals||[]).some(p=>p.is_selected&&p.outcome==='won')).length;
  const totL=closed.filter(r=>(r.proposals||[]).some(p=>p.is_selected&&p.outcome==='lost')).length;

  return`<div class="card"><div class="eyebrow">Bilancio del pool</div>
    <div class="statgrid">
      <div class="stat"><div class="k">Turni</div><div class="v">${closed.length}</div></div>
      <div class="stat"><div class="k">Vinte</div><div class="v green">${totW}</div></div>
      <div class="stat"><div class="k">Perse</div><div class="v coral">${totL}</div></div>
      <div class="stat"><div class="k">% successo</div><div class="v gold">${(totW+totL)?Math.round(totW/(totW+totL)*100):0}%</div></div>
    </div>
  </div>
  <div class="card"><div class="eyebrow">🏆 Coppie · scommesse vinte</div>
    ${cs.map((c,i)=>`<div class="rank"><div class="pos ${i===0&&c.won>0?'top':''}">${i+1}</div>
      <div class="nm">${esc(c.name)}<div class="note">${c.played} turni · ${c.won}V / ${c.lost}P</div></div>
      <div class="pts">${c.won}</div></div>`).join('')}
  </div>
  <div class="card"><div class="eyebrow" style="color:var(--muted)">🎯 Classifica pronosticatori</div>
    <div class="note">Disponibile dopo l'integrazione completa dei profili utente.</div>
  </div>`;
}

// ── VIEW: COPPIE ──────────────────────────────────────────────
function viewCoppie(){
  const r=cur();
  const activeCoupleId=r?.couple_id||null;
  const activeDbCouple=activeCoupleId?A.couples.find(c=>c.id===activeCoupleId):null;
  const activeName=activeDbCouple?.name||null;
  return`<div class="card"><div class="eyebrow">Le 4 coppie · ordine di rotazione</div>
    ${COUPLES.map((c,i)=>`<div class="couple-card ${c.name===activeName?'active':''}">
      <div class="ttl">${i+1}. ${esc(c.name)} ${c.name===activeName?'· tocca a loro':''}</div>
      <div class="sub">${esc(c.members.join(' & '))}</div></div>`).join('')}
    <div class="note" style="margin-top:4px">Rotazione automatica: dopo la coppia 4 si riparte dalla 1.</div>
  </div>
  <div class="card"><div class="eyebrow" style="color:var(--coral)">Zona pericolo</div>
    <div class="note" style="margin-bottom:10px">Cancella tutti i turni e la classifica. Le coppie restano.</div>
    <button class="btn btn-ghost" onclick="if(confirm('Sicuro? Operazione irreversibile.'))resetAll()">Azzera turni e classifica</button>
  </div>`;
}

async function resetAll(){
  await sb.from('votes').delete().neq('id','00000000-0000-0000-0000-000000000000');
  await sb.from('proposals').delete().neq('id','00000000-0000-0000-0000-000000000000');
  await sb.from('round_matches').delete().neq('id','00000000-0000-0000-0000-000000000000');
  await sb.from('rounds').delete().neq('id','00000000-0000-0000-0000-000000000000');
  await loadRounds();render();
}

// ── TOOLTIP VOTANTI ───────────────────────────────────────────
(function(){
  const tip=document.createElement('div');
  tip.id='voter-tooltip';
  document.body.appendChild(tip);
  let hideTimer;

  function showTip(el,evt){
    const voters=el.dataset.voters;
    if(!voters){return;}
    tip.textContent='Voti: '+voters;
    tip.classList.add('show');
    const rect=el.getBoundingClientRect();
    const tipW=200;
    tip.style.left=Math.min(Math.max(rect.right-tipW,8),window.innerWidth-tipW-8)+'px';
    tip.style.top=Math.max(rect.top-44,8)+'px';
    clearTimeout(hideTimer);
  }
  function hideTip(){
    hideTimer=setTimeout(()=>tip.classList.remove('show'),300);
  }

  document.addEventListener('mouseover',e=>{
    const t=e.target.closest('.tooltip-trigger');
    if(t)showTip(t,e);
  });
  document.addEventListener('mouseout',e=>{
    if(e.target.closest('.tooltip-trigger'))hideTip();
  });
  document.addEventListener('click',e=>{
    const t=e.target.closest('.tooltip-trigger');
    if(t){showTip(t,e);setTimeout(hideTip,2000);}
  });
})();
